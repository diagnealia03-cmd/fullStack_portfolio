<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un projet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Mon Portfolio</h1>
    <nav>
        <a href="lister-projets.html">Liste des projets</a> |
        <a href="ajouter-projet.html">Ajouter un projet</a>
    </nav>
</header>

<h2>Ajouter un projet</h2>

<form action="#" method="post">
    <label for="libelle">Libellé :</label><br>
    <input type="text" id="libelle" name="libelle" required><br><br>

    <label for="description">Description :</label><br>
    <textarea id="description" name="description" rows="4" required></textarea><br><br>

    <label for="image">URL de l'image :</label><br>
    <input type="text" id="image" name="image" required><br><br>

    <label for="technologies">Technologies utilisées (séparées par des virgules) :</label><br>
    <input type="text" id="technologies" name="technologies" required><br><br>

    <button type="submit">Ajouter le projet</button>
</form>

<footer>

</footer>

</body>
</html>
